apiVersion: v1
kind: Secret
metadata:
  name: springboot-db-secret
type: Opaque
data:
  DB_USERNAME: c3ByaW5ndXNlcg==       # springuser
  DB_PASSWORD: c3ByaW5ncGFzczEyMw==   # springpass123
  DB_HOST: MzUuMjAwLjIwNC4xNg==       # 35.200.204.16
  DB_PORT:MzMwNg==                    # 3306
  DB_NAME: Y2F0ZWdvcnlkYg==           # categorydb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  labels:
    app: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot-app
          image: asia-south1-docker.pkg.dev/gke-springboot-472605/springboot-artifacts/springboot-app:latest
          ports:
            - containerPort: 8070
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: springboot-db-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: springboot-db-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: springboot-db-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: springboot-db-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: springboot-db-secret
                  key: DB_NAME
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8070
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8070
            initialDelaySeconds: 20
            periodSeconds: 5
